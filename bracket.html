<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bracket</title>
    <style>
    /*
     *  Flex Layout Specifics
    */
    main{
      display:flex;
      flex-direction:row;
    }
    .round{
      display:flex;
      flex-direction:column;
      justify-content:center;
      width:200px;
      list-style:none;
      padding:0;
    }
      .round .spacer{ flex-grow:1; }
      .round .spacer:first-child,
      .round .spacer:last-child{ flex-grow:.5; }

      .round .game-spacer{
        flex-grow:1;
      }

    /*
     *  General Styles
    */
    body{
      font-family:sans-serif;
      font-size:small;
      padding:10px;
      line-height:1.4em;
    }

    li.game{
      padding-left:20px;
    }

      li.game.winner{
        font-weight:bold;
      }
      li.game span{
        float:right;
        margin-right:5px;
      }

      li.game-top{ border-bottom:1px solid #aaa; }

      li.game-spacer{
        border-right:1px solid #aaa;
        min-height:40px;
      }

      li.game-bottom{
        border-top:1px solid #aaa;
      }

    </style>
  </head>
  <body>
    <h1>2017 Mikaela Password Tournament - Championship Bracket</h1>
<main id="tournament">
	<ul class="round round-2">
		<li class="spacer">&nbsp;</li>

		<li class="game game-top">Brian <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom ">Miguel<span></span></li>

		<li class="spacer">&nbsp;</li>

		<li class="game game-top">Edilyn <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom ">Cherry <span></span></li>

		<li class="spacer">&nbsp;</li>

		<li class="game game-top ">Mika <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom">Ruel <span></span></li>

		<li class="spacer">&nbsp;</li>

		<li class="game game-top ">Torres <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom">Dhiane <span></span></li>

		<li class="spacer">&nbsp;</li>
	</ul>
	<ul class="round round-3">
		<li class="spacer">&nbsp;</li>

		<li class="game game-top winner"> <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom "> <span></span></li>

		<li class="spacer">&nbsp;</li>

		<li class="game game-top "> <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom winner"> <span></span></li>

		<li class="spacer">&nbsp;</li>
	</ul>
	<ul class="round round-4">
		<li class="spacer">&nbsp;</li>

		<li class="game game-top winner"> <span></span></li>
		<li class="game game-spacer">&nbsp;</li>
		<li class="game game-bottom "> <span></span></li>

		<li class="spacer">&nbsp;</li>
	</ul>
</main>
  </body>
</html>
