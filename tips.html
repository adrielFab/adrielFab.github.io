<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Career Path</title>
    <link href="http://fonts.googleapis.com/css?family=Open+Sans|Dosis:400,800|Homemade+Apple" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" integrity="sha384-PsH8R72JQ3SOdhVi3uxftmaW6Vc51MKb0q5P2rRUpPvrszuE4W1povHYgTpBfshb" crossorigin="anonymous">

    <script src="https://use.fontawesome.com/e1b001fcec.js"></script>
    <link rel="stylesheet" href="public/css/headers.css">
    <link rel="stylesheet" href="public/css/styleCareer.css">
    <style>
      img {
        max-height: 100%;
        max-width: 100%;
      }
      #slide1 { content: url("./public/img/Slide1.jpg"); }
    </style>
  </head>
  <body>
    <div id="pageTips">
      <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
        <div class="carousel-inner" role="listbox">
          <div class="carousel-item active">
            <img class="d-block img-fluid" src="public/img/slide1.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/slide2.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/slide3.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/slide4.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/Slide5.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/Slide6.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/Slide7.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/Slide8.jpg">
          </div>
          <div class="carousel-item">
            <img class="d-block img-fluid" src="public/img/Slide9.jpg">
          </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.1.1.slim.min.js" integrity="sha384-A7FZj7v+d/sdmMqp/nOQwliLvUsJfDHW+k9Omg/a/EheAdgtzNs3hpfag6Ed950n" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tether/1.4.0/js/tether.min.js" integrity="sha384-DztdAPBWPRXSA/3eYEEUWrWCy7G5KFbe8fFjk5JAIxUYHKkDx6Qin1DkWx51bBrb" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-alpha.6/js/bootstrap.min.js" integrity="sha384-vBWWzlZJ8ea9aCX4pEW3rVHjgjt7zpkNpZk+02D9phzyeVkE+jo0ieGizqPLForn" crossorigin="anonymous"></script>   
    <script src="https://cdn.jsdelivr.net/npm/vue" type="text/javascript"></script>
    <script>
      new Vue({
        el: '#pageTips',

        data : {
          backgroundHeight: {
            'height': $(window).height() + 'px'
          }
        }
      });
    </script>
  </body>
</html>
