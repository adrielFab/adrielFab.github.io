<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Submit</title>
    <link href="../css/reset.css" rel="stylesheet" type="text/css">
    <link href="../css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Lato|Questrial" rel="stylesheet">

    <style>
      body {
        text-align: center;
        background: blue url('../img/background-teal.jpg');
      }
      .btn-default {
        font-family: 'Questrial', sans-serif;
        font-weight: bold;
        width: 250px;
        margin: 20px 0;
        font-size: 30px;
      }
      .wrapper {
        width: 200px;
        height: 200px;
        top: 50%;
        left: 50%;
        position: fixed;
        margin-left: -100px;
        margin-top: -100px;
      }
      .header {
        width: 500px;
        height: 500px;
        position: fixed;
        top: 50%;
        left: 50%;
        margin-left: -250px;
        margin-top: -250px;
      }
      h1 {
        color: #fff;
        font-family: 'Questrial',sans-serif;
        font-size: 56px;
      }
      h6 {
        font-family: 'Questrial', sans-serif;
        font-size: 22px;
        color: #eee;
        position: relative;
        top: -18px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>
          Mikaela's bday
      </h1>
      <h6>
          Click PLAYER to play
      </h6>
    </div>
    <div class="wrapper">
        <div class="row">
          <button type="button" class="btn btn-default">Game Master</button>
        </div>
        <div class="row">
          <button type="button" class="btn btn-default">Player</button>
        </div>
    </div>
  </body>
</html>
